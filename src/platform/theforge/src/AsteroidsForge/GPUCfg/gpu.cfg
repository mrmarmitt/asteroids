#version: 0.3
# Derivado do gpu.cfg dos Unit_Tests do The-Forge, com uma diferenca
# deliberada: SEM a regra "VendorID != 0x8086..." que bane GPUs Intel.
# No The-Forge, as regras de GPU_SELECTION tambem sao usadas como REQUISITO
# de suporte da GPU escolhida (util_check_is_gpu_supported) — com a regra,
# qualquer maquina em que a Intel venca a selecao (ex.: iGPU com preset maior
# que uma dGPU fraca) falha com "GPU Unsupported". Este jogo so desenha texto
# via fontstash: roda em qualquer D3D12, incluindo integradas Intel.
# (Tambem removidas as linhas isHeadLess/dynamicRenderingEnabled, invalidas
# nesta versao/backend — o log as reporta como propriedade invalida.)

BEGIN_GPU_SELECTION;
GraphicQueueSupported == 1;
deviceid == PreferredGPU;
GpuPresetLevel;
DirectXFeatureLevel;
VRAM;
END_GPU_SELECTION;

BEGIN_DRIVER_REJECTION;
END_DRIVER_REJECTION;

BEGIN_GPU_SETTINGS;
END_GPU_SETTINGS;

BEGIN_USER_SETTINGS;
END_USER_SETTINGS;
